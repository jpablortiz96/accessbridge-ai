<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#1A1A2E"/>
  <!-- Bridge arc -->
  <path d="M3 22 C3 12 11 6 16 6 C21 6 29 12 29 22"
        stroke="#16C172" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Bridge deck -->
  <line x1="1" y1="22" x2="31" y2="22"
        stroke="#FAFAFA" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Suspender cables -->
  <line x1="16" y1="6"  x2="9"  y2="22"
        stroke="#16C172" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1.5 1.5"/>
  <line x1="16" y1="6"  x2="23" y2="22"
        stroke="#16C172" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="1.5 1.5"/>
  <!-- Crown node -->
  <circle cx="16" cy="6" r="2" fill="#16C172"/>
</svg>
